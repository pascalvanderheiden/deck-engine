name: Squad Triage

on:
  issues:
    types: [opened, labeled]

jobs:
  triage:
    if: >-
      (github.event.action == 'opened') ||
      (github.event.action == 'labeled' && github.event.label.name == 'squad')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const issueText = `${issue.title}\n${issue.body || ''}`.toLowerCase();

            // Skip if already triaged (has a squad:* agent label)
            const hasAgentLabel = labels.some(l => l.startsWith('squad:') && l !== 'squad');
            if (hasAgentLabel) {
              core.info('Already triaged — skipping');
              return;
            }

            // Auto-apply squad label if missing (board-created issues)
            if (!labels.includes('squad')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['squad']
              });
            }

            // Product → PO + doer + repo mapping
            const PRODUCT_MAP = {
              'deck-engine':    { po: 'Messi',   doer: 'De Paul', repo: 'deck-engine' },
              'deck-launcher':  { po: 'Julian',  doer: 'De Paul', repo: 'deck-launcher' },
              'deck-saas-core': { po: 'Enzo',    doer: 'Lautaro', repo: 'deck-saas-core' },
              'deck-gateway':   { po: 'Cuti',    doer: 'Licha',   repo: 'deck-saas-core' },
            };

            const PRODUCT_KEYWORDS = {
              'deck-engine':    ['slide', 'theme', 'component', 'scaffolder', 'create-deckio', 'vitest', 'deck-engine', 'jsx', 'vite plugin'],
              'deck-launcher':  ['launcher', 'project picker', 'workspace', 'preview', 'copilot sdk', 'server-plugin', 'deck-launcher', 'import'],
              'deck-saas-core': ['kubernetes', 'k8s', 'docker', 'dockerfile', 'bicep', 'aks', 'acr', 'kustomize', 'deploy', 'container', 'infrastructure', 'deck-saas'],
              'deck-gateway':   ['gateway', 'oauth', 'auth', 'session', 'login', 'handoff', 'proxy', 'namespace provisioning', 'caddy', 'tls'],
            };

            // Detect product from form dropdown first
            let detectedProduct = null;
            for (const product of Object.keys(PRODUCT_MAP)) {
              if (issueText.includes(`### product\n\n${product}`) || issueText.includes(`product: ${product}`)) {
                detectedProduct = product;
                break;
              }
            }

            // Fall back to keyword matching
            if (!detectedProduct) {
              let bestScore = 0;
              for (const [product, keywords] of Object.entries(PRODUCT_KEYWORDS)) {
                const score = keywords.filter(kw => issueText.includes(kw)).length;
                if (score > bestScore) {
                  bestScore = score;
                  detectedProduct = product;
                }
              }
            }

            if (!detectedProduct) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `### ⚽ Squad Triage\n\nCould not detect the target product. Add a \`product:*\` label manually.`
              });
              return;
            }

            const { po, doer, repo: correctRepo } = PRODUCT_MAP[detectedProduct];
            const normalize = (s) => s.toLowerCase().replace(/[^a-z0-9]/g, '');
            const currentRepo = context.repo.repo;
            const isWrongRepo = correctRepo !== currentRepo;

            // --- WRONG REPO: Transfer the issue ---
            if (isWrongRepo) {
              try {
                await github.graphql(`
                  mutation($issueId: ID!, $repoId: ID!) {
                    transferIssue(input: { issueId: $issueId, repositoryId: $repoId }) {
                      issue { number url }
                    }
                  }
                `, {
                  issueId: issue.node_id,
                  repoId: (await github.rest.repos.get({
                    owner: context.repo.owner,
                    repo: correctRepo
                  })).data.node_id
                });

                core.info(`Transferred #${issue.number} to ${correctRepo}`);
                // The transferred issue will re-trigger triage in the correct repo
                return;
              } catch (err) {
                // Transfer failed — triage in place with a warning
                core.warning(`Could not transfer: ${err.message}`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: [
                    `### ⚽ Squad Triage`,
                    '',
                    `⚠️ **Wrong repo** — this issue is for **${detectedProduct}** but was filed in **${currentRepo}**.`,
                    `Transfer failed: ${err.message}`,
                    `Please move it manually to \`deckio-art/${correctRepo}\`.`,
                  ].join('\n')
                });
                return;
              }
            }

            // --- CORRECT REPO: Triage normally ---
            const doerLabel = `squad:${normalize(doer)}`;
            const poLabel = `squad:${normalize(po)}`;

            // Check if issue is well-formed enough to skip PO review
            // Well-formed = has product dropdown filled + has description + has acceptance criteria
            const hasDescription = issue.body && issue.body.includes('### Description') &&
              !issue.body.includes('### Description\n\n_No response_') &&
              issue.body.split('### Description')[1]?.trim().length > 20;
            const hasAcceptance = issue.body && issue.body.includes('### Acceptance Criteria') &&
              !issue.body.includes('### Acceptance Criteria\n\n_No response_') &&
              issue.body.split('### Acceptance Criteria')[1]?.trim().length > 10;
            const hasFormProduct = issue.body && issue.body.includes('### Product\n\n');
            const isWellFormed = hasFormProduct && hasDescription;

            if (isWellFormed) {
              // Well-formed → auto-approve, assign doer directly, assign Copilot
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [poLabel, doerLabel, `product:${detectedProduct}`, 'go:yes']
              });

              // Read doer charter for Copilot custom instructions
              const charterPath = `.squad/agents/${normalize(doer)}/charter.md`;
              let charterContent = '';
              if (fs.existsSync(charterPath)) {
                charterContent = fs.readFileSync(charterPath, 'utf8');
              }

              const customInstructions = [
                `You are ${doer}, a member of the Deck Squad.`,
                `Follow your charter strictly.`,
                '',
                '## Your Charter',
                charterContent,
                '',
                '## Rules',
                '- Write tests for every change',
                '- Match existing code conventions',
                '- Stay within your product scope',
                '- Read .squad/team.md, .squad/routing.md, .squad/decisions.md for context',
              ].join('\n');

              // Assign Copilot coding agent
              const { data: repoData } = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              let copilotAssigned = false;
              try {
                await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  assignees: ['copilot-swe-agent[bot]'],
                  agent_assignment: {
                    target_repo: `${context.repo.owner}/${context.repo.repo}`,
                    base_branch: repoData.default_branch,
                    custom_instructions: customInstructions,
                  },
                });
                copilotAssigned = true;
              } catch (err) {
                core.warning(`Could not assign Copilot: ${err.message}`);
              }

              const copilotNote = copilotAssigned
                ? `Copilot coding agent assigned as ${doer} — will create a branch and open a PR.`
                : `⚠️ Could not assign Copilot (${copilotAssigned ? '' : 'enable Coding Agent in repo settings'}). Assign manually.`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  `### ⚽ Squad Triage → Auto-approved`,
                  '',
                  `**Product:** ${detectedProduct}`,
                  `**PO:** ${po} · **Doer:** ${doer}`,
                  '',
                  copilotNote,
                  `${po} reviews the PR and merges.`,
                ].join('\n')
              });

              core.info(`Auto-approved #${issue.number} → ${doer} (copilot: ${copilotAssigned})`);
            } else {
              // Needs PO review — assign PO only
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [poLabel, `product:${detectedProduct}`, 'go:needs-research']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  `### ⚽ Squad Triage`,
                  '',
                  `**Product:** ${detectedProduct}`,
                  `**Assigned to:** ${po} (Product Owner)`,
                  `**Doer:** ${doer}`,
                  '',
                  `Needs PO review — missing description or acceptance criteria.`,
                  `${po}: apply \`go:yes\` + \`squad:${normalize(doer)}\` when ready.`,
                ].join('\n')
              });

              core.info(`Triaged #${issue.number} → ${po} for review (${detectedProduct})`);
            }

